services:

  # -------------------------
  # NGINX
  # -------------------------
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped

  # -------------------------
  # PHP for TODO
  # -------------------------
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: todo-php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    restart: unless-stopped
